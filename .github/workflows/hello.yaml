name: My first Workflow

on:
push:
pull_request:

jobs:
say-hello:
runs-on: ubuntu-latest
steps:
- name: Print my name
run: |
echo "Hello, Shubham!"
echo "shubham"

say-bye:
runs-on: ubuntu-latest
needs: say-hello
steps:
- name: Print bye message
run: |
echo "Bye, Shubham!"
echo "shubham"
